name: eid_royale
description: A romantic Eid greeting page generator with Telegram integration.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 📸 Image handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.2.0
  path_provider: ^2.1.3

  # 🌐 HTTP (Telegram)
  dio: ^5.4.3

  # 📤 Share file
  share_plus: ^7.2.2

  # 🎨 Fonts
  google_fonts: ^6.2.1

  photo_manager: ^3.0.0
  shared_preferences: ^2.2.2

  # 📅 (optionnel mais OK)
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true