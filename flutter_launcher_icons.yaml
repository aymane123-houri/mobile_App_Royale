flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  
  # Pour les icônes adaptatives Android (recommandé)
  adaptive_icon_background: "#080708"
  adaptive_icon_foreground: "assets/icon/icon.png"

  # Optionnel : enlever le fond transparent sur iOS
  remove_alpha_ios: true