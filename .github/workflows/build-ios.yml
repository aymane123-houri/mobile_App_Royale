name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Set Development Team (Important)
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "YOUR_TEAM_ID_HERE";/' ios/Runner.xcodeproj/project.pbxproj
          echo "✅ Development Team configuré"

      - name: Build IPA
        run: flutter build ipa --release --no-codesign --export-options-plist=ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Royale-Moments-IPA
          path: build/ios/ipa/*.ipa
          retention-days: 14